# fly.toml - Fly.io configuration for ElloMusic
app = "ellomusic"  # Change this to a unique name (must be globally unique on Fly.io)
primary_region = "sin"  # Singapore — closest free region to India

[build]

[env]
  NODE_ENV = "production"

# No HTTP services block — Discord bots don't need inbound web traffic
# All secrets (BOT_TOKEN, MONGODB_URI, etc.) are set via: flyctl secrets set KEY=value

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
