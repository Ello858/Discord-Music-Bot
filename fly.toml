# fly.toml - Fly.io configuration for ElloMusic
app = "ellomusic"  # Change this to whatever unique name you want
primary_region = "sin"  # Singapore — closest free region to India

[build]

[env]
  NODE_ENV = "production"

# No HTTP services needed — this is a Discord bot (no web traffic)
# All env secrets (BOT_TOKEN, MONGODB_URI, etc.) are set via CLI, NOT here

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
